# =========================================================================
#   Ceedling - Test-Centered Build System for C
# =========================================================================

---
:project:
  :which_ceedling: gem
  :ceedling_version: 1.0.1
  :use_mocks: TRUE
  :use_test_preprocessor: :none  
  :use_deep_preprocessor: :none  
  :use_backtrace: :simple        
  :use_decorators: :auto         
  :build_root: build
  :test_file_prefix: test_
  :default_tasks:
    - test:all

  :test_threads: 1              # Set to 1 to run sequentially and pass validation
  :compile_threads: 8
  :release_build: FALSE

:mixins:
  :enabled: []
  :load_paths: []

:test_build:
  :use_assembly: FALSE

:release_build:
  :output: MyApp.out
  :use_assembly: FALSE
  :artifacts: []

:plugins:
  :load_paths: []
  :enabled:
    - module_generator                
    - gcov                           
    - report_tests_log_factory
    - report_tests_pretty_stdout

:report_tests_log_factory:
  :reports:
    - json 
    - junit 
    - cppunit 
    - html 

:extension:
  :executable: .out

# =========================================================================
#   FLAT PATHS CONFIGURATION (MATCHING YOUR DISK LAYOUT)
# =========================================================================
:paths:
  :test:
    - +:Test/**               # Scans your flat Test folder directly
  :source:
    - src/**
  :include:
    - src/** 
  :support:
    - +:Test/support/**       # Map support scripts relative to your main Test folder
  :libraries: []

:files:
  :test: []
  :source: []

:defines:
  :test:
    - TEST
    - UNITY_BREAK_ON_FAIL      # Native macro mapping to enable short-circuiting loops
  :release: []
  :use_test_definition: FALSE 

# =========================================================================
#   FORCE INJECT MACRO OVERRIDES VIA INCLUDES
# =========================================================================
:includes:
  :test:
    - unity_support.h

:cmock:
  :plugins:                        
    - :ignore
    - :callback
  :verbosity:  2                   
  :when_no_prototypes:  :warn      
  :skeleton_path:  ''              
  :mock_prefix:  'mock_'           
  :mock_suffix:  ''                
  :strippables:  ['(?:__attribute__\s*\([ (]*.*?[ )]*\)+)']
  :attributes:
     - __ramfunc
     - __irq
     - __fiq
     - register
     - extern
  :c_calling_conventions:
     - __stdcall
     - __cdecl
     - __fastcall
  :treat_externs:  :exclude        
  :treat_inlines:  :exclude        
  :treat_as:                       
    uint8:    HEX8
    uint16:   HEX16
    uint32:   UINT32
    int8:     INT8
    bool:     UINT8
  :memcmp_if_unknown:  true        
  :when_ptr:  :compare_data        
  :weak:  ''                       
  :enforce_strict_ordering: true   
  :fail_on_unexpected_calls: true  
  :callback_include_count: true    
  :callback_after_arg_check: false 
  :exclude_setjmp_h:  false

# =========================================================================
#   Custom Tool Overrides for Jenkins Integration
# =========================================================================
:gcov:
  :gcovr:
    :executable: 'C:/Users/JKMT1110/AppData/Local/Programs/Python/Python314/Scripts/gcovr.exe'
